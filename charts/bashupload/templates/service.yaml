apiVersion: v1
kind: Service
metadata:
  name: {{ include "bashupload.fullname" . }}
  namespace: {{ include "bashupload.namespace" . }}
  labels:
    {{- include "bashupload.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "bashupload.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: https
      port: 443
      targetPort: https
