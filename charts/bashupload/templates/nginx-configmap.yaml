apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bashupload.fullname" . }}-nginx-conf
  namespace: {{ include "bashupload.namespace" . }}
  labels:
    {{- include "bashupload.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;

    events {
        worker_connections 1024;
    }

    http {
        sendfile on;
        client_max_body_size {{ .Values.nginx.clientMaxBodySize }};

        server {
            listen 80;
            listen [::]:80;
            listen 443 ssl http2;
            listen [::]:443 ssl http2;

            server_name _;

            ssl_certificate /etc/nginx/certs/tls.crt;
            ssl_certificate_key /etc/nginx/certs/tls.key;
            ssl_protocols {{ .Values.nginx.sslProtocols }};
            ssl_ciphers HIGH:!aNULL:!MD5;
            ssl_prefer_server_ciphers on;
            ssl_session_cache shared:SSL:10m;
            ssl_session_timeout 10m;

            location = {{ .Values.nginx.healthCheckPath }} {
                default_type text/plain;
                return 200 '{{ .Values.nginx.healthCheckResponse }}';
            }

            location / {
                proxy_pass http://127.0.0.1:{{ .Values.config.port }};
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_request_buffering off;
            }
        }
    }
